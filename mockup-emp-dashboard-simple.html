<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 대시보드 목업 (간소)</title>
<style>
:root{
  --blue:#0050FF;--blue-light:#EEF3FF;--bg:#FFFFFF;--white:#FFFFFF;
  --gray-100:#F9FAFB;--gray-200:#E5E8EB;--gray-400:#B0B8C1;--gray-600:#4E5968;
  --text:#191F28;--danger:#F04452;--success:#05C072;--success-light:#E8FAF3;
  --warn:#FF9500;--warn-light:#FFF3E0;
  --toss-blue:#3182F6;--toss-blue-strong:#0064FF;--toss-blue-light:#EDF4FF;
  --toss-green:#0CAB6C;
  --toss-text-1:#191F28;--toss-text-2:#333D4B;--toss-text-3:#6B7684;--toss-text-4:#8B95A1;--toss-text-5:#B0B8C1;
  --toss-line:#F2F4F6;--toss-line-2:#E5E8EB;
  --card-radius:20px;
  --card-shadow:0 4px 14px rgba(20,40,80,0.07), 0 1px 3px rgba(20,40,80,0.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  max-width:430px;margin:0 auto;
  padding:60px 14px 80px;
}

/* ─ 헤더 (기존 앱과 동일) */
.header{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:60px;padding:0 16px;
  background:var(--white);border-bottom:1px solid var(--toss-line-2);
  display:flex;align-items:center;justify-content:space-between;z-index:100;
}
.header-title{font-size:18px;font-weight:800;color:var(--toss-blue-strong);letter-spacing:-0.5px;}
.header-store{
  font-size:12px;font-weight:700;color:var(--toss-text-2);
  background:var(--toss-line);padding:7px 11px;border-radius:99px;
  max-width:135px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ─ 인사말 (기존 .dash-hello와 동일) */
.dash-hello{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin:6px 4px 12px;}
.dash-hello h1{font-size:17px;font-weight:800;color:#191F28;margin:0;letter-spacing:-0.5px;line-height:1.2;white-space:nowrap;}
.dash-hello p{font-size:12px;color:#8B95A1;margin:0;font-weight:500;letter-spacing:-0.3px;white-space:nowrap;}

/* ─ 현재 매장 배너 (출퇴근 실수 방지) */
.store-banner{
  background:var(--toss-blue-light);border-radius:14px;
  padding:14px 16px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.store-banner-left{display:flex;flex-direction:column;gap:3px;}
.store-banner-label{font-size:11px;font-weight:700;color:var(--toss-blue);letter-spacing:-0.2px;}
.store-banner-name{font-size:16px;font-weight:900;color:var(--toss-blue-strong);letter-spacing:-0.4px;}
.store-change-btn{
  font-size:12px;font-weight:700;color:var(--toss-blue);
  background:var(--white);border:none;padding:8px 12px;
  border-radius:10px;cursor:pointer;white-space:nowrap;
  box-shadow:0 1px 4px rgba(49,130,246,0.15);
}

/* ─ KPI 카드 (기존 .att-kpi-row와 동일) */
.att-kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.att-kpi-cell{background:var(--white);padding:16px 14px;border-radius:14px;box-shadow:var(--card-shadow);display:flex;flex-direction:column;justify-content:center;}
.att-kpi-lbl{font-size:11px;color:var(--toss-text-4);font-weight:600;letter-spacing:-0.2px;margin-bottom:4px;}
.att-kpi-val{font-size:22px;font-weight:800;color:var(--toss-text-1);letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.att-kpi-sub{font-size:11px;font-weight:600;color:var(--toss-text-5);margin-top:4px;}
.att-kpi-cell.wage .att-kpi-lbl{color:var(--toss-blue);font-weight:700;}
.att-kpi-cell.wage .att-kpi-val{color:var(--toss-blue-strong);}
.att-kpi-cell.wage .att-kpi-sub{color:var(--toss-green);}

/* ─ 구분선 + 이번 달 기간 표시 */
.period-label{
  font-size:11px;font-weight:700;color:var(--toss-text-5);
  letter-spacing:0.2px;margin-bottom:8px;padding-left:2px;
}

/* ─ 하단 네비 (기존과 동일) */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:56px;
  background:var(--white);border-top:1px solid var(--gray-200);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--toss-text-4);cursor:pointer;gap:2px;
}
.nav-item.active{color:var(--toss-blue-strong);}
.nav-icon{font-size:20px;line-height:1;}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-title">퐁당샤브</div>
  <div class="header-store">퐁당샤브 강남점</div>
</div>

<!-- 인사말 -->
<div class="dash-hello">
  <h1>안녕하세요, 김민준 님 👋</h1>
  <p>6월 22일 (일)</p>
</div>

<!-- 현재 매장 배너 (출퇴근 실수 방지) -->
<div class="store-banner">
  <div class="store-banner-left">
    <div class="store-banner-label">현재 선택된 매장</div>
    <div class="store-banner-name">퐁당샤브 강남점</div>
  </div>
  <button class="store-change-btn">매장 전환 →</button>
</div>

<!-- 이번 달 기간 -->
<div class="period-label">2026년 6월 (1일 – 22일 기준)</div>

<!-- KPI 카드 2개 -->
<div class="att-kpi-row">
  <div class="att-kpi-cell">
    <div class="att-kpi-lbl">이번 달 근무시간</div>
    <div class="att-kpi-val">52<span style="font-size:14px;font-weight:700;color:var(--toss-text-3);"> h</span></div>
    <div class="att-kpi-sub">지난달 48h</div>
  </div>
  <div class="att-kpi-cell wage">
    <div class="att-kpi-lbl">이번 달 예상 급여</div>
    <div class="att-kpi-val">572,000<span style="font-size:13px;font-weight:700;"> 원</span></div>
    <div class="att-kpi-sub">주휴수당 포함</div>
  </div>
</div>

<!-- 하단 네비 -->
<div class="bottom-nav">
  <div class="nav-item active">
    <div class="nav-icon">📊</div>
    <span>대시보드</span>
  </div>
  <div class="nav-item">
    <div class="nav-icon">⏰</div>
    <span>근태</span>
  </div>
</div>

</body>
</html>
