<title>영수증 정확도 측정실 (관리자)</title>
<style>
  :root{
    --primary:#6D28D9; --primary-light:#EDE9FE; --primary-dark:#5B21B6;
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB;
    --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563; --gray-700:#374151; --text:#111827;
    --success:#10B981; --success-bg:#ECFDF5; --danger:#EF4444; --danger-bg:#FEE2E2;
    --warn:#F59E0B; --warn-bg:#FEF3C7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--gray-100); color:var(--text); font-size:14px; line-height:1.5; padding:0 0 60px;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:580px; margin:0 auto; padding:0 12px;}
  header{background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff;
    padding:18px 16px; position:sticky; top:0; z-index:10;}
  header .title{font-size:18px; font-weight:800;}
  header .sub{font-size:11px; opacity:.85; margin-top:3px;}
  .badge-admin{display:inline-block; background:rgba(255,255,255,.2); border-radius:6px;
    padding:2px 7px; font-size:10px; margin-left:6px; vertical-align:middle;}
  section{background:#fff; border-radius:14px; margin-top:12px; padding:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .sec-title{font-size:13px; font-weight:700; color:var(--gray-700); margin-bottom:10px;
    display:flex; align-items:center; gap:6px;}
  /* 엔진 */
  .engines{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .engine{border:2px solid var(--gray-200); border-radius:10px; padding:10px; cursor:pointer; transition:.15s;}
  .engine.active{border-color:var(--primary); background:var(--primary-light);}
  .engine.disabled{opacity:.55;}
  .engine .en{font-weight:700; font-size:13px;}
  .engine .meta{font-size:10.5px; color:var(--gray-500); margin-top:3px;}
  .engine .tag{font-size:9.5px; border-radius:5px; padding:1px 5px; margin-top:5px; display:inline-block;}
  .tag-ok{background:var(--success-bg); color:var(--success);}
  .tag-key{background:var(--warn-bg); color:#92400E;}
  .tag-old{background:var(--gray-100); color:var(--gray-500);}
  /* 종합 점수판 */
  .scoreboard{display:flex; align-items:center; gap:16px; padding:4px 2px 10px;}
  .big-score{font-size:54px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums;}
  .big-score small{font-size:20px;}
  .score-side{flex:1; font-size:12px; color:var(--gray-600); line-height:1.7;}
  .score-side b{font-variant-numeric:tabular-nums;}
  .hl-ok{color:var(--success); font-weight:700;}
  .hl-bad{color:var(--danger); font-weight:700;}
  .axes{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px;}
  .axis{background:var(--gray-50); border-radius:9px; padding:8px 4px; text-align:center;}
  .axis .ax-name{font-size:10px; color:var(--gray-500);}
  .axis .ax-val{font-size:15px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums;}
  .axis .ax-sub{font-size:9.5px; color:var(--gray-400); margin-top:1px;}
  .bar{height:5px; background:var(--gray-200); border-radius:3px; margin-top:5px; overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:3px; width:0; transition:width .6s;}
  .btn{display:block; width:100%; border:none; border-radius:10px; padding:12px;
    font-size:14px; font-weight:700; cursor:pointer; margin-top:12px;}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-ghost{background:var(--gray-100); color:var(--gray-700); font-size:12px; padding:9px;}
  /* 틀린 행 모아보기 */
  .err-item{display:flex; gap:8px; padding:9px 0; border-bottom:1px solid var(--gray-100); font-size:12px;}
  .err-item .where{color:var(--gray-500); white-space:nowrap; font-weight:600;}
  .err-item .what{flex:1;}
  .err-item .what .diff{font-weight:700;}
  .err-item .reason{font-size:11px; color:var(--warn); margin-top:2px;}
  .all-ok{text-align:center; color:var(--success); padding:14px; font-size:13px; font-weight:600;}
  /* 명세서 카드 */
  .sheet{border:1px solid var(--gray-200); border-radius:11px; margin-top:10px; overflow:hidden;}
  .sheet-head{padding:11px 12px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:8px;}
  .sheet-head .s-left{display:flex; align-items:center; gap:9px; min-width:0;}
  .s-no{font-weight:800; color:var(--primary); font-size:16px;}
  .s-date{font-size:13px; font-weight:600;}
  .s-meta{font-size:10.5px; color:var(--gray-500);}
  .vbadge{font-size:11px; border-radius:7px; padding:3px 8px; white-space:nowrap; font-weight:700;}
  .v-ok{background:var(--success-bg); color:var(--success);}
  .v-mid{background:var(--warn-bg); color:#92400E;}
  .v-wait{background:var(--gray-100); color:var(--gray-500); font-weight:600;}
  .sheet-body{display:none; border-top:1px solid var(--gray-100); padding:10px 12px;}
  .sheet.open .sheet-body{display:block;}
  table{width:100%; border-collapse:collapse; font-size:11.5px;}
  th,td{padding:5px 4px; text-align:left; border-bottom:1px solid var(--gray-100);}
  th{color:var(--gray-500); font-weight:600; font-size:10px;}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .row-bad{background:var(--danger-bg);}
  .ai-bad{color:var(--danger); font-weight:700;}
  .ai-ok{color:var(--gray-400);}
  .ox{font-weight:800;}
  .ox-o{color:var(--success);}
  .ox-x{color:var(--danger);}
  .reason-sm{font-size:10px; color:var(--warn);}
  .note{font-size:11px; color:#92400E; background:var(--warn-bg); border-radius:8px; padding:8px 10px;}
  /* 로그 */
  .log-row{display:grid; grid-template-columns:auto 1fr auto; gap:8px; padding:8px 0;
    border-bottom:1px solid var(--gray-100); font-size:11.5px; align-items:center;}
  .log-empty{text-align:center; color:var(--gray-500); padding:18px; font-size:12px;}
  .pill{font-size:10px; border-radius:5px; padding:2px 6px; background:var(--gray-100); color:var(--gray-600);}
  .mini{font-size:10.5px; color:var(--gray-500);}
  .demo-note{font-size:10.5px; color:var(--gray-500); text-align:center; margin-top:8px;}
</style>
</head>

    {no:14,name:'백목이버섯 白木耳 1kg',u:6,b:0,e:6,qty:6,price:13500,sum:81000},
    {no:15,name:'치즈떡(요리인) 1kg',u:8,b:1,e:4,qty:12,price:3700,sum:44400},
    {no:16,name:'고구마떡(요리인) 1kg',u:8,b:0,e:1,qty:1,price:3700,sum:3700},
    {no:17,name:'부산어묵 나무꼬치-오양 960g',u:10,b:1,e:7,qty:17,price:6500,sum:110500},
    {no:18,name:'진공자숙 연근 450g',u:20,b:0,e:10,qty:10,price:1900,sum:19000},
    {no:19,name:'이삼보 즈마장 2.5kg',u:6,b:0,e:3,qty:3,price:18000,sum:54000},
    {no:20,name:'단단 피현두반장 1.3kg',u:8,b:0,e:1,qty:1,price:8201,sum:8200},
  ]},
];

const ENGINES=[
  {id:'gemini',name:'Gemini 2.5 Flash',meta:'구글 · 현재 사용 중',cost:'~4원/장',tag:'연결됨',tagCls:'tag-ok',enabled:true},
  {id:'clova-doc',name:'클로바 문서전용',meta:'네이버 · 표 인식',cost:'미정',tag:'키 발급 필요',tagCls:'tag-key',enabled:false},
  {id:'upstage',name:'업스테이지',meta:'한국 문서 특화',cost:'미정',tag:'키 발급 필요',tagCls:'tag-key',enabled:false},
  {id:'clova-gen',name:'클로바 일반',meta:'글자만+GPT조립',cost:'~30원/장',tag:'기록 62.5%',tagCls:'tag-old',enabled:false},
];
let curEngine='gemini';

// ─── 데모용 의도적 오류 (실제 엔진 연결 시 이 부분이 진짜 호출로 교체) ───
// BOX/EA 헷갈림 흉내 (dev_lessons #95 실제 사고 패턴)
const DEMO_ERR={
  '④':[{i:7,qty:18,reason:'BOX 1을 못 봄 (단위만 셈)'}],
  '⑤':[{i:8,qty:60,reason:'BOX 0인데 단위×EA로 오인'},{i:11,name:'설카베치즈떡',reason:'품목명 오독'}],
  '⑥':[{i:5,qty:80,reason:'BOX 2 → 4로 잘못'}],
};
function makeDemoAI(s){
  const ai=JSON.parse(JSON.stringify(s));
  (DEMO_ERR[s.id]||[]).forEach(err=>{
    if(ai.items[err.i]){
      if(err.qty!=null) ai.items[err.i].qty=err.qty;
      if(err.name!=null) ai.items[err.i].name=err.name;
      ai.items[err.i]._reason=err.reason;
    }
  });
  return ai;
}

// ─── 품목명 느슨 비교 ───
function nameNorm(s){return String(s||'').replace(/[\s()\[\]\/·,]/g,'').replace(/\d+(g|kg|L|ml)/gi,'').replace(/[①-⑨]/g,'').replace(/코리아|완자/g,'').slice(0,5);}
function nameMatch(a,b){const x=nameNorm(a),y=nameNorm(b);if(!x||!y)return false;return x===y||x.includes(y)||y.includes(x);}

// ─── 채점 ───
function gradeSheet(ans,ai){
  const items=ans.items,n=items.length;
  let qtyHit=0,nameHit=0;
  const rows=items.map((a,i)=>{
    const r=(ai.items||[])[i]||{};
    const qOk=Number(r.qty)===Number(a.qty);
    const nOk=nameMatch(r.name,a.name);
    if(qOk)qtyHit++; if(nOk)nameHit++;
    return {a,r,qOk,nOk};
  });
  const sumOk=Number(ai.totalSum)===Number(ans.totalSum);
  const rowPass=rows.filter(x=>x.qOk&&x.nOk).length;
  return {rows,n,rowPass,sumOk,
    qtyPct:Math.round(qtyHit/n*100),namePct:Math.round(nameHit/n*100),
    overall:Math.round(((sumOk?1:0)*0.4+(qtyHit/n)*0.4+(nameHit/n)*0.2)*100)};
}

function renderEngines(){
  document.getElementById('engines').innerHTML=ENGINES.map(e=>`
    <div class="engine ${e.id===curEngine?'active':''} ${e.enabled?'':'disabled'}" data-eng="${e.id}">
      <div class="en">${e.name}</div><div class="meta">${e.meta} · ${e.cost}</div>
      <span class="tag ${e.tagCls}">${e.tag}</span></div>`).join('');
  document.querySelectorAll('.engine').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.eng,eng=ENGINES.find(x=>x.id===id);
    if(!eng.enabled){alert(eng.name+'\n\n키(접속 열쇠) 발급 후 연결됩니다.\n사장님이 키 주시면 측정실에 꽂아 바로 채점합니다.');return;}
    curEngine=id;renderEngines();runAll();
  }));
  document.getElementById('engNow').textContent='· '+ENGINES.find(e=>e.id===curEngine).name;
}
function fmt(n){return n==null?'-':Number(n).toLocaleString('ko-KR');}

function renderScore(agg){
  document.getElementById('bigScore').innerHTML=agg.overall+'<small>%</small>';
  const col=agg.overall>=90?'var(--success)':agg.overall>=70?'var(--warn)':'var(--danger)';
  document.getElementById('bigScore').style.color=col;
  document.getElementById('scoreSide').innerHTML=
    `총 <b>${agg.totalRows}행</b> 중 <b class="hl-ok">${agg.passRows}행 정확</b>`+
    (agg.badRows?`, <b class="hl-bad">${agg.badRows}행 틀림</b>`:'')+`<br>`+
    `명세서 합계 <b>${agg.sumOk}/${agg.graded}건</b> 일치<br>`+
    `<span class="mini">${ENGINES.find(e=>e.id===curEngine).name} · 5건 한 판 채점</span>`;
  const set=(id,v,sub)=>{document.getElementById('ax-'+id).textContent=v+'%';
    document.getElementById('sub-'+id).textContent=sub;
    const b=document.getElementById('bar-'+id);b.style.width=v+'%';
    b.style.background=v>=90?'var(--success)':v>=70?'var(--warn)':'var(--danger)';};
  set('sum',agg.sumPct,`${agg.sumOk}/${agg.graded}건`);
  set('qty',agg.qtyPct,`${agg.qtyHit}/${agg.totalRows}행`);
  set('name',agg.namePct,`${agg.nameHit}/${agg.totalRows}행`);
}

function renderErrors(results){
  const errs=[];
  SHEETS.forEach((s,si)=>{
    const r=results[si]; if(!r)return;
    r.rows.forEach(row=>{
      if(!row.qOk) errs.push({sheet:s.id,no:row.a.no,name:row.a.name,
        type:'수량',ans:row.a.qty,ai:row.r.qty,reason:row.r._reason||''});
      else if(!row.nOk) errs.push({sheet:s.id,no:row.a.no,name:row.a.name,
        type:'품목',ans:row.a.name,ai:row.r.name,reason:row.r._reason||''});
    });
  });
  const el=document.getElementById('errors');
  document.getElementById('errCount').textContent=errs.length?`(${errs.length}건)`:'';
  if(!errs.length){el.innerHTML=`<div class="all-ok">✅ 틀린 행 없음 — 전부 정확</div>`;return;}
  el.innerHTML=errs.map(e=>`<div class="err-item">
    <span class="where">${e.sheet} ${e.no}행</span>
    <div class="what">${e.name}<br>
      <span class="diff">${e.type}: 답지 <b>${fmt(e.ans)}</b> → AI <b class="hl-bad">${fmt(e.ai)}</b></span>
      ${e.reason?`<div class="reason">↳ ${e.reason}</div>`:''}
    </div></div>`).join('');
}

function renderSheets(results){
  document.getElementById('sheets').innerHTML=SHEETS.map((s,si)=>{
    const res=results[si];
    let badge;
    if(!s.complete)badge=`<span class="vbadge v-wait">재촬영 대기</span>`;
    else if(res){const cls=res.rowPass===res.n?'v-ok':'v-mid';
      badge=`<span class="vbadge ${cls}">${res.rowPass}/${res.n} ✅</span>`;}
    else badge=`<span class="vbadge v-ok">합계 ✅</span>`;
    const rows=s.items.map((it,ri)=>{
      const rr=res&&res.rows[ri];
      const bad=rr&&(!rr.qOk||!rr.nOk);
      const aiQty=rr?(rr.qOk?`<span class="ai-ok">${it.qty}</span>`:`<span class="ai-bad">${rr.r.qty??'?'}</span>`):'-';
      const ox=rr?(rr.qOk&&rr.nOk?'<span class="ox ox-o">O</span>':'<span class="ox ox-x">X</span>'):'';
      const nameCell=(rr&&!rr.nOk)?`${it.name}<br><span class="reason-sm">AI: ${rr.r.name||'?'}</span>`:it.name;
      const reason=(rr&&rr.r._reason&&bad)?`<br><span class="reason-sm">↳ ${rr.r._reason}</span>`:'';
      return `<tr class="${bad?'row-bad':''}">
        <td>${it.no}</td><td>${nameCell}${reason}</td>
        <td class="num">${it.u}/${it.b}/${it.e}</td>
        <td class="num">${it.qty===0?'-':it.qty}</td>
        <td class="num">${aiQty}</td>
        <td style="text-align:center">${ox}</td></tr>`;
    }).join('');
    return `<div class="sheet ${res&&res.rowPass!==res.n?'open':''}" data-si="${si}">
      <div class="sheet-head">
        <div class="s-left"><span class="s-no">${s.id}</span>
        <div><div class="s-date">${s.date}</div>
        <div class="s-meta">${s.items.length}행 · 합계 ${fmt(s.totalSum)}원${s.pages>1?' · '+s.pages+'장':''}</div></div></div>
        ${badge}
      </div>
      <div class="sheet-body">
        ${s.note?`<div class="note">📷 ${s.note}</div>`:`<table>
          <tr><th>No</th><th>품목</th><th class="num">단/박/낱</th><th class="num">답지</th><th class="num">AI</th><th style="text-align:center">판정</th></tr>
          ${rows}</table>`}
      </div></div>`;
  }).join('');
  document.querySelectorAll('.sheet-head').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));
}

function runAll(){
  const targets=SHEETS.map((s,si)=>({s,si})).filter(x=>x.s.complete);
  const results={};
  let sumOk=0,qtyHit=0,nameHit=0,totalRows=0,passRows=0,ovSum=0;
  targets.forEach(({s,si})=>{
    const r=gradeSheet(s,makeDemoAI(s)); results[si]=r;
    if(r.sumOk)sumOk++;
    r.rows.forEach(x=>{if(x.qOk)qtyHit++;if(x.nOk)nameHit++;});
    totalRows+=r.n; passRows+=r.rowPass; ovSum+=r.overall;
  });
  const g=targets.length;
  const agg={graded:g,totalRows,passRows,badRows:totalRows-passRows,
    sumOk,qtyHit,nameHit,
    sumPct:Math.round(sumOk/g*100),qtyPct:Math.round(qtyHit/totalRows*100),
    namePct:Math.round(nameHit/totalRows*100),overall:Math.round(ovSum/g)};
  renderScore(agg); renderErrors(results); renderSheets(results); addLog(agg);
}

function getLogs(){try{return JSON.parse(localStorage.getItem('accLogs')||'[]');}catch{return[];}}
function addLog(agg){
  const logs=getLogs();
  logs.unshift({t:new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    eng:ENGINES.find(e=>e.id===curEngine).name,overall:agg.overall,sum:agg.sumPct,qty:agg.qtyPct,name:agg.namePct,
    cost:ENGINES.find(e=>e.id===curEngine).cost});
  localStorage.setItem('accLogs',JSON.stringify(logs.slice(0,30))); renderLogs();
}
function renderLogs(){
  const logs=getLogs(),el=document.getElementById('logs');
  if(!logs.length){el.innerHTML=`<div class="log-empty">아직 시연 기록이 없습니다.</div>`;return;}
  el.innerHTML=logs.map(l=>`<div class="log-row">
    <span class="mini">${l.t}</span>
    <span><b>${l.overall}%</b> <span class="pill">${l.eng}</span>
    <span class="mini">합${l.sum} 수${l.qty} 품${l.name}</span></span>
    <span class="mini">${l.cost}</span></div>`).join('');
}

renderEngines();
document.getElementById('runAll').addEventListener('click',runAll);
document.getElementById('clearLog').addEventListener('click',()=>{localStorage.removeItem('accLogs');renderLogs();});
runAll();  // 열자마자 자동 채점 (데모)
</script>
