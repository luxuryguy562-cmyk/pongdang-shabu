<title>영수증 정확도 측정실 (관리자)</title>
<style>
  :root{
    --primary:#6D28D9; --primary-light:#EDE9FE; --primary-dark:#5B21B6;
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB;
    --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563; --gray-700:#374151; --text:#111827;
    --success:#10B981; --success-bg:#ECFDF5; --danger:#EF4444; --danger-bg:#FEE2E2;
    --warn:#F59E0B; --warn-bg:#FEF3C7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--gray-100); color:var(--text); font-size:14px; line-height:1.5; padding:0 0 60px;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:560px; margin:0 auto; padding:0 12px;}
  header{background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff;
    padding:18px 16px; position:sticky; top:0; z-index:10;}
  header .title{font-size:18px; font-weight:800;}
  header .sub{font-size:11px; opacity:.85; margin-top:3px;}
  .badge-admin{display:inline-block; background:rgba(255,255,255,.2); border-radius:6px;
    padding:2px 7px; font-size:10px; margin-left:6px; vertical-align:middle;}
  section{background:#fff; border-radius:14px; margin-top:12px; padding:14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .sec-title{font-size:13px; font-weight:700; color:var(--gray-700); margin-bottom:10px;
    display:flex; align-items:center; gap:6px;}
  .engines{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .engine{border:2px solid var(--gray-200); border-radius:10px; padding:10px; cursor:pointer; transition:.15s;}
  .engine.active{border-color:var(--primary); background:var(--primary-light);}
  .engine.disabled{opacity:.55;}
  .engine .en{font-weight:700; font-size:13px;}
  .engine .meta{font-size:10.5px; color:var(--gray-500); margin-top:3px;}
  .engine .tag{font-size:9.5px; border-radius:5px; padding:1px 5px; margin-top:5px; display:inline-block;}
  .tag-ok{background:var(--success-bg); color:var(--success);}
  .tag-key{background:var(--warn-bg); color:#92400E;}
  .tag-old{background:var(--gray-100); color:var(--gray-500);}
  .scoreboard{text-align:center; padding:6px 0 2px;}
  .big-score{font-size:46px; font-weight:800; color:var(--primary); line-height:1; font-variant-numeric:tabular-nums;}
  .big-score small{font-size:18px; color:var(--gray-500);}
  .score-label{font-size:11.5px; color:var(--gray-500); margin-top:4px;}
  .axes{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:14px;}
  .axis{background:var(--gray-50); border-radius:9px; padding:8px 4px; text-align:center;}
  .axis .ax-name{font-size:10px; color:var(--gray-500);}
  .axis .ax-val{font-size:16px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums;}
  .bar{height:5px; background:var(--gray-200); border-radius:3px; margin-top:5px; overflow:hidden;}
  .bar > i{display:block; height:100%; background:var(--success); border-radius:3px; width:0; transition:width .5s;}
  .btn{display:block; width:100%; border:none; border-radius:10px; padding:11px; font-size:13.5px; font-weight:700; cursor:pointer; margin-top:8px;}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:disabled{opacity:.6;}
  .btn-ghost{background:var(--gray-100); color:var(--gray-700); font-size:12px; padding:9px;}
  .sheet{border:1px solid var(--gray-200); border-radius:11px; margin-top:10px; overflow:hidden;}
  .sheet-head{padding:11px 12px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:8px;}
  .sheet-head .s-left{display:flex; align-items:center; gap:9px; min-width:0;}
  .s-no{font-weight:800; color:var(--primary); font-size:16px;}
  .s-date{font-size:13px; font-weight:600;}
  .s-meta{font-size:10.5px; color:var(--gray-500);}
  .vbadge{font-size:11px; border-radius:7px; padding:3px 8px; white-space:nowrap; font-weight:700;}
  .v-ok{background:var(--success-bg); color:var(--success);}
  .v-mid{background:var(--warn-bg); color:#92400E;}
  .v-none{background:var(--gray-100); color:var(--gray-500); font-weight:600;}
  .v-wait{background:var(--gray-100); color:var(--gray-500); font-weight:600;}
  .sheet-body{display:none; border-top:1px solid var(--gray-100); padding:11px 12px;}
  .sheet.open .sheet-body{display:block;}
  .uploader{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
  .file-label{flex:1; border:1.5px dashed var(--gray-300); border-radius:9px; padding:9px; text-align:center;
    font-size:12px; color:var(--gray-600); cursor:pointer;}
  .file-label.has{border-color:var(--primary); color:var(--primary); background:var(--primary-light);}
  .file-label input{display:none;}
  .up-btn{border:none; border-radius:9px; padding:9px 14px; font-size:12.5px; font-weight:700;
    background:var(--primary); color:#fff; cursor:pointer; white-space:nowrap;}
  .up-btn:disabled{opacity:.6;}
  table{width:100%; border-collapse:collapse; font-size:11.5px;}
  th,td{padding:5px 4px; text-align:left; border-bottom:1px solid var(--gray-100);}
  th{color:var(--gray-500); font-weight:600; font-size:10px;}
  td.num,th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .row-bad{background:var(--danger-bg);}
  .ai-bad{color:var(--danger); font-weight:700;}
  .ai-ok{color:var(--gray-400);}
  .ox{font-weight:800; text-align:center;}
  .ox-o{color:var(--success);} .ox-x{color:var(--danger);}
  .reason-sm{font-size:10px; color:var(--warn);}
  .note{font-size:11px; color:#92400E; background:var(--warn-bg); border-radius:8px; padding:8px 10px;}
  .err-box{font-size:11.5px; color:var(--danger); background:var(--danger-bg); border-radius:8px; padding:9px 10px; margin-top:8px;}
  .log-row{display:grid; grid-template-columns:auto 1fr auto; gap:8px; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:11.5px; align-items:center;}
  .log-empty{text-align:center; color:var(--gray-500); padding:16px; font-size:12px;}
  .pill{font-size:10px; border-radius:5px; padding:2px 6px; background:var(--gray-100); color:var(--gray-600);}
  .mini{font-size:10.5px; color:var(--gray-500);}
  .demo-note{font-size:10.5px; color:var(--gray-500); text-align:center; margin-top:8px;}
</style>

const ENGINES=[
  {id:'gemini',name:'Gemini 2.5 Flash',meta:'구글 · 현재 사용 중',cost:'~6원/장',tag:'연결됨',tagCls:'tag-ok',enabled:true},
  {id:'clova-doc',name:'클로바 문서전용',meta:'네이버 · 표 인식',cost:'미정',tag:'키 발급 필요',tagCls:'tag-key',enabled:false},
  {id:'upstage',name:'업스테이지',meta:'한국 문서 특화',cost:'미정',tag:'키 발급 필요',tagCls:'tag-key',enabled:false},
  {id:'clova-gen',name:'클로바 일반',meta:'글자만+GPT',cost:'~30원/장',tag:'기록 62.5%',tagCls:'tag-old',enabled:false},
];
let curEngine='gemini';
let results={};   // {si: 채점결과}
let fileBuf={};   // {si: [File...]}

// ─── 이미지 → base64 (1280px 리사이즈, 우리 앱 동일) ───
function fileToB64(file){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const cvs=document.createElement('canvas');
        let w=img.width,h=img.height; if(w>1280){h*=1280/w;w=1280;}
        cvs.width=w; cvs.height=h; cvs.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cvs.toDataURL('image/jpeg',0.85).split(',')[1]);
      };
      img.onerror=reject; img.src=e.target.result;
    };
    fr.onerror=reject; fr.readAsDataURL(file);
  });
}

// ─── 진짜 Gemini 호출 (worker 경유, callGemini와 동일 형식) ───
async function callRealGemini(b64list){
  const parts=[{text:REAL_PROMPT}];
  b64list.forEach(b=>parts.push({inline_data:{mime_type:'image/jpeg',data:b}}));
  const ctrl=new AbortController();
  const to=setTimeout(()=>ctrl.abort(),(30+(b64list.length-1)*5)*1000);
  try{
    const res=await fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts}],generationConfig:{response_mime_type:'application/json'},_model:'gemini-2.5-flash',_provider:'gemini'}),signal:ctrl.signal});
    if(!res.ok){const t=await res.text().catch(()=>''); throw new Error(`서버 ${res.status} ${t.slice(0,120)}`);}
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'AI 오류');
    const txt=data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!txt) throw new Error('빈 응답');
    return {ai:JSON.parse(txt.replace(/```json|```/g,'').trim()), cost:data?._costWon};
  } finally { clearTimeout(to); }
}
function aiToAnswer(raw){
  return {totalSum:raw.total_sum, items:(raw.items||[]).map(it=>({name:it.i,price:it.u,qty:it.q,sum:it.p}))};
}

// ─── 품목명 느슨 비교 ───
function nameNorm(s){return String(s||'').replace(/[\s()\[\]\/·,]/g,'').replace(/\d+(g|kg|L|ml)/gi,'').replace(/[①-⑨]/g,'').replace(/코리아|완자/g,'').slice(0,5);}
function nameMatch(a,b){const x=nameNorm(a),y=nameNorm(b);if(!x||!y)return false;return x===y||x.includes(y)||y.includes(x);}

function gradeSheet(ans,ai){
  const items=ans.items,n=items.length;
  let qtyHit=0,nameHit=0;
  const rows=items.map((a,i)=>{
    const r=(ai.items||[])[i]||{};
    const qOk=Number(r.qty)===Number(a.qty);
    const nOk=nameMatch(r.name,a.name);
    if(qOk)qtyHit++; if(nOk)nameHit++;
    return {a,r,qOk,nOk};
  });
  const sumOk=Number(ai.totalSum)===Number(ans.totalSum);
  const rowPass=rows.filter(x=>x.qOk&&x.nOk).length;
  return {rows,n,rowPass,sumOk,qtyHit,nameHit,
    qtyPct:Math.round(qtyHit/n*100),namePct:Math.round(nameHit/n*100),
    overall:Math.round(((sumOk?1:0)*0.4+(qtyHit/n)*0.4+(nameHit/n)*0.2)*100)};
}

// ─── 업로드 → 분석 → 채점 ───
async function handleAnalyze(si){
  const files=fileBuf[si]||[];
  if(!files.length){alert('먼저 사진을 고르세요');return;}
  const btn=document.getElementById('upbtn-'+si);
  if(btn){btn.disabled=true; btn.textContent='분석 중…';}
  try{
    const b64s=[]; for(const f of files){ b64s.push(await fileToB64(f)); }
    const {ai:raw, cost}=await callRealGemini(b64s);
    const r=gradeSheet(SHEETS[si], aiToAnswer(raw));
    r._cost=cost; r._pages=files.length;
    results[si]=r;
    addLog(SHEETS[si].id, r, cost);
    renderAll();
  }catch(e){
    results[si]={_error:e.message};
    renderAll();
  }
}

function renderEngines(){
  document.getElementById('engines').innerHTML=ENGINES.map(e=>`
    <div class="engine ${e.id===curEngine?'active':''} ${e.enabled?'':'disabled'}" data-eng="${e.id}">
      <div class="en">${e.name}</div><div class="meta">${e.meta} · ${e.cost}</div>
      <span class="tag ${e.tagCls}">${e.tag}</span></div>`).join('');
  document.querySelectorAll('.engine').forEach(el=>el.addEventListener('click',()=>{
    const e=ENGINES.find(x=>x.id===el.dataset.eng);
    if(!e.enabled){alert(e.name+'\n\n키(접속 열쇠) 발급 후 연결됩니다.');return;}
    curEngine=e.id; renderEngines();
  }));
  document.getElementById('engNow').textContent='· '+ENGINES.find(e=>e.id===curEngine).name;
}
function fmt(n){return n==null?'-':Number(n).toLocaleString('ko-KR');}

function renderScore(){
  const done=Object.entries(results).filter(([si,r])=>r&&!r._error);
  if(!done.length){
    document.getElementById('bigScore').innerHTML='—<small>%</small>';
    document.getElementById('scoreLabel').textContent='아래 명세서별로 사진을 올려 채점하세요';
    ['sum','qty','name'].forEach(k=>{document.getElementById('ax-'+k).textContent='—';document.getElementById('bar-'+k).style.width='0';});
    return;
  }
  let sumOk=0,qtyHit=0,nameHit=0,total=0,ov=0;
  done.forEach(([si,r])=>{if(r.sumOk)sumOk++; qtyHit+=r.qtyHit; nameHit+=r.nameHit; total+=r.n; ov+=r.overall;});
  const g=done.length;
  const overall=Math.round(ov/g);
  document.getElementById('bigScore').innerHTML=overall+'<small>%</small>';
  document.getElementById('bigScore').style.color=overall>=90?'var(--success)':overall>=70?'var(--warn)':'var(--danger)';
  document.getElementById('scoreLabel').textContent=`${ENGINES.find(e=>e.id===curEngine).name} · 채점 ${g}건 · 총 ${total}행 중 ${qtyHit}행 수량 정확`;
  const set=(k,v)=>{document.getElementById('ax-'+k).textContent=v+'%';const b=document.getElementById('bar-'+k);b.style.width=v+'%';b.style.background=v>=90?'var(--success)':v>=70?'var(--warn)':'var(--danger)';};
  set('sum',Math.round(sumOk/g*100)); set('qty',Math.round(qtyHit/total*100)); set('name',Math.round(nameHit/total*100));
}

function renderSheets(){
  document.getElementById('sheets').innerHTML=SHEETS.map((s,si)=>{
    const r=results[si];
    let badge;
    if(!s.complete) badge='<span class="vbadge v-wait">재촬영 대기</span>';
    else if(r&&r._error) badge='<span class="vbadge v-mid">분석 실패</span>';
    else if(r) badge=`<span class="vbadge ${r.rowPass===r.n?'v-ok':'v-mid'}">${r.overall}점</span>`;
    else badge='<span class="vbadge v-none">미채점</span>';
    const fileN=(fileBuf[si]||[]).length;
    let body;
    if(!s.complete){ body=`<div class="note">📷 ${s.note}</div>`; }
    else {
      let res='';
      if(r&&r._error){ res=`<div class="err-box">⚠️ ${r._error}<br><span class="mini">중계서버가 이 화면을 막으면, 운영 앱(#admin) 통합이 필요합니다.</span></div>`; }
      else if(r){
        const rows=s.items.map((it,ri)=>{
          const rr=r.rows[ri]; const bad=rr&&(!rr.qOk||!rr.nOk);
          const aiQty=rr?(rr.qOk?`<span class="ai-ok">${it.qty}</span>`:`<span class="ai-bad">${rr.r.qty??'?'}</span>`):'-';
          const ox=rr?(rr.qOk&&rr.nOk?'<span class="ox-o">O</span>':'<span class="ox-x">X</span>'):'';
          const nm=(rr&&!rr.nOk)?`${it.name}<br><span class="reason-sm">AI: ${rr.r.name||'?'}</span>`:it.name;
          return `<tr class="${bad?'row-bad':''}"><td>${it.no}</td><td>${nm}</td><td class="num">${it.u}/${it.b}/${it.e}</td><td class="num">${it.qty===0?'-':it.qty}</td><td class="num">${aiQty}</td><td class="ox">${ox}</td></tr>`;
        }).join('');
        res=`<div class="mini" style="margin-bottom:6px;">합계 ${r.sumOk?'✅ 일치':'❌ 불일치'} · 수량 ${r.qtyHit}/${r.n}행 · ${r._pages}장 분석${r._cost?' · '+r._cost.toFixed(1)+'원':''}</div>
          <table><tr><th>No</th><th>품목</th><th class="num">단/박/낱</th><th class="num">답지</th><th class="num">AI</th><th class="ox">판정</th></tr>${rows}</table>`;
      }
      body=`<div class="uploader">
          <label class="file-label ${fileN?'has':''}" id="lbl-${si}">${fileN?`📷 ${fileN}장 선택됨`:'📷 사진 고르기 (여러 장 가능)'}<input type="file" accept="image/*" multiple data-si="${si}"></label>
          <button class="up-btn" id="upbtn-${si}">분석·채점</button>
        </div>${res}`;
    }
    return `<div class="sheet ${r&&!r._error?'open':''}" data-si="${si}">
      <div class="sheet-head"><div class="s-left"><span class="s-no">${s.id}</span>
        <div><div class="s-date">${s.date}</div><div class="s-meta">${s.complete?s.items.length+'행':'미완'} · 합계 ${fmt(s.totalSum)}원${s.pages>1?' · '+s.pages+'장':''}</div></div></div>
        ${badge}</div>
      <div class="sheet-body">${body}</div></div>`;
  }).join('');
  // 이벤트 연결
  document.querySelectorAll('.sheet-head').forEach(h=>h.addEventListener('click',e=>{
    if(e.target.closest('.uploader')) return;
    h.parentElement.classList.toggle('open');
  }));
  document.querySelectorAll('input[type=file]').forEach(inp=>inp.addEventListener('change',e=>{
    const si=+inp.dataset.si; fileBuf[si]=[...inp.files];
    const lbl=document.getElementById('lbl-'+si);
    if(lbl){lbl.classList.toggle('has',!!inp.files.length); lbl.childNodes[0].textContent=inp.files.length?`📷 ${inp.files.length}장 선택됨`:'📷 사진 고르기 (여러 장 가능)';}
  }));
  document.querySelectorAll('.up-btn').forEach(b=>b.addEventListener('click',()=>handleAnalyze(+b.id.split('-')[1])));
}

function renderAll(){ renderScore(); renderSheets(); }

function getLogs(){try{return JSON.parse(localStorage.getItem('accLogs')||'[]');}catch{return[];}}
function addLog(sheetId,r,cost){
  const logs=getLogs();
  logs.unshift({t:new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
    eng:ENGINES.find(e=>e.id===curEngine).name,sheet:sheetId,overall:r.overall,sum:r.sumOk?'O':'X',
    qty:`${r.qtyHit}/${r.n}`,cost:cost?cost.toFixed(1)+'원':'-'});
  localStorage.setItem('accLogs',JSON.stringify(logs.slice(0,40))); renderLogs();
}
function renderLogs(){
  const logs=getLogs(),el=document.getElementById('logs');
  if(!logs.length){el.innerHTML='<div class="log-empty">아직 채점 기록이 없습니다.</div>';return;}
  el.innerHTML=logs.map(l=>`<div class="log-row"><span class="mini">${l.t}</span>
    <span><b>${l.sheet} ${l.overall}%</b> <span class="pill">${l.eng}</span> <span class="mini">합${l.sum} 수${l.qty}</span></span>
    <span class="mini">${l.cost}</span></div>`).join('');
}

renderEngines();
renderAll();
renderLogs();
document.getElementById('clearLog').addEventListener('click',()=>{localStorage.removeItem('accLogs');renderLogs();});
