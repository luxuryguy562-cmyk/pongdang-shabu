<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통장입금·현금지출 한 줄</title>
<style>
:root{
  --blue:#3182F6;--blue-strong:#0064FF;--blue-light:#EDF4FF;
  --bg:#F2F4F6;--white:#fff;
  --g100:#F9FAFB;--g200:#E5E8EB;--g300:#D1D6DB;--g400:#B0B8C1;--g500:#8B95A1;--g600:#6B7684;
  --text:#191F28;--danger:#F04452;--danger-light:#FFEBEE;--success:#0CAB6C;
  --radius:18px;--shadow:0 4px 14px rgba(20,40,80,.07),0 1px 3px rgba(20,40,80,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',-apple-system,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:14px;letter-spacing:-.3px;}
.phone{width:100%;max-width:420px;}
.title{font-size:17px;font-weight:900;text-align:center;margin-bottom:4px;}
.title small{display:block;font-size:12px;color:var(--g500);font-weight:600;margin-top:3px;}
.sec{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;}
.sec-t{font-size:15px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.sec-t .tot{font-size:15px;font-weight:900;color:var(--danger);}
.sec-sub{font-size:11px;color:var(--g500);margin:3px 0 12px;}
/* 한 줄 */
.row{display:flex;align-items:center;gap:6px;background:var(--g100);border-radius:12px;padding:7px 9px;margin-bottom:7px;}
.row .sign{flex:0 0 30px;height:36px;border:none;border-radius:8px;background:var(--danger-light);color:var(--danger);font-size:16px;font-weight:900;cursor:pointer;}
.row .amt{flex:0 0 96px;border:none;background:#fff;border-radius:8px;padding:9px 8px;font-size:14px;font-weight:800;text-align:right;min-width:0;}
.row .memo{flex:1;border:none;background:#fff;border-radius:8px;padding:9px 10px;font-size:12px;min-width:0;}
.row .cat{flex:0 0 34px;height:36px;border:1px dashed var(--g300);background:transparent;border-radius:8px;font-size:14px;cursor:pointer;color:var(--g400);}
.row .cat.set{border-style:solid;border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.row .x{flex:0 0 26px;height:26px;border:none;border-radius:50%;background:var(--danger-light);color:var(--danger);font-size:13px;font-weight:800;cursor:pointer;}
.addbtn{width:100%;border:1px dashed var(--g300);background:transparent;border-radius:10px;padding:9px;font-size:12px;color:var(--g600);font-weight:700;cursor:pointer;margin-top:2px;}
.note{font-size:11px;color:var(--g500);text-align:center;margin:8px 0 2px;line-height:1.6;}
.note b{color:var(--blue-strong);}
</style>
</head>
<body>
<div class="phone">
  <div class="title">한 항목 = 한 줄<small>금액 · 메모 (현금지출만 🏷️ 분류 아이콘)</small></div>

  <div class="sec">
    <div class="sec-t"><span>🏧 통장 입금</span><span class="tot">0원</span></div>
    <div class="sec-sub">금고 현금을 통장으로 옮긴 돈 (지출 아닌 이동)</div>
    <div class="row">
      <input class="amt" placeholder="금액">
      <input class="memo" placeholder="메모 (예: 매출 입금)">
      <button class="x">×</button>
    </div>
    <div class="row">
      <input class="amt" value="1,348,400">
      <input class="memo" value="가게 매출 입금">
      <button class="x">×</button>
    </div>
    <button class="addbtn">+ 통장 입금 추가</button>
  </div>

  <div class="sec">
    <div class="sec-t"><span>💵 현금 지출</span><span class="tot">0원</span></div>
    <div class="sec-sub">금고에서 현금으로 나간 돈. 들어온 경우는 − 토글.</div>
    <div class="row">
      <button class="sign">−</button>
      <input class="amt" placeholder="금액">
      <input class="memo" placeholder="메모 (예: 식자재)">
      <button class="cat" title="분류">🏷️</button>
      <button class="x">×</button>
    </div>
    <div class="row">
      <button class="sign">−</button>
      <input class="amt" value="380,000">
      <input class="memo" value="식자재 구매">
      <button class="cat set" title="분류">🏷️</button>
      <button class="x">×</button>
    </div>
    <button class="addbtn">+ 현금 지출 추가</button>
  </div>

  <div class="note">한 줄에 <b>금액 + 메모</b>. 현금 지출은 <b>🏷️</b> 눌러야 분류 선택(평소엔 회색, 달면 파랑).<br>통장 입금은 분류 없음 → 더 깔끔.</div>
  <div style="height:30px"></div>
</div>
</body>
</html>
