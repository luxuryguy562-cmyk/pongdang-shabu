<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>차감 입력 B안 최종</title>
<style>
:root{
  --blue:#3182F6;--blue-strong:#0064FF;--blue-light:#EDF4FF;
  --bg:#F2F4F6;--white:#fff;
  --g100:#F9FAFB;--g200:#E5E8EB;--g300:#D1D6DB;--g400:#B0B8C1;--g500:#8B95A1;--g600:#6B7684;
  --text:#191F28;--danger:#F04452;--danger-light:#FFEBEE;--success:#0CAB6C;
  --radius:18px;--shadow:0 4px 14px rgba(20,40,80,.07),0 1px 3px rgba(20,40,80,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard',-apple-system,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:14px;letter-spacing:-.3px;}
.phone{width:100%;max-width:420px;}
.title{font-size:17px;font-weight:900;text-align:center;margin-bottom:12px;}
.sec{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px;}
.sec-t{font-size:15px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.sec-t .tot{font-size:15px;font-weight:900;color:var(--danger);}
.sec-sub{font-size:11px;color:var(--g500);margin:3px 0 12px;line-height:1.5;}
.row{background:var(--g100);border-radius:14px;padding:12px 13px;margin-bottom:8px;}
.top{display:flex;align-items:center;gap:8px;}
.sign{flex:0 0 26px;height:26px;border:none;border-radius:50%;background:var(--danger-light);color:var(--danger);font-size:15px;font-weight:900;cursor:pointer;}
.amt{flex:1;border:none;background:transparent;font-size:20px;font-weight:900;text-align:left;color:var(--text);min-width:0;}
.amt::placeholder{color:var(--g400);font-weight:700;}
.x{flex:0 0 24px;height:24px;border:none;border-radius:50%;background:#fff;color:var(--g400);font-size:14px;cursor:pointer;}
.bot{display:flex;align-items:center;gap:8px;margin-top:8px;}
.memo{flex:1;border:none;background:#fff;border-radius:8px;padding:9px 10px;font-size:12px;min-width:0;}
.chip{flex:0 0 auto;font-size:11px;font-weight:700;padding:9px 11px;border-radius:8px;border:1px dashed var(--g300);color:var(--g500);background:#fff;cursor:pointer;white-space:nowrap;}
.chip.set{border-style:solid;border-color:var(--blue);color:var(--blue);background:var(--blue-light);}
.addbtn{width:100%;border:1px dashed var(--g300);background:transparent;border-radius:10px;padding:10px;font-size:12px;color:var(--g600);font-weight:700;cursor:pointer;margin-top:2px;}
.hintline{font-size:10px;color:var(--g400);margin-top:7px;display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div class="phone">
  <div class="title">B안 최종 — 분류 안내 추가</div>

  <!-- 통장 입금 (분류 없음) -->
  <div class="sec">
    <div class="sec-t"><span>🏧 통장 입금</span><span class="tot">1,348,400원</span></div>
    <div class="sec-sub">금고 현금을 통장으로 옮긴 돈 (지출 아닌 이동)<br>👤 <b>입금자</b>는 자동으로 로그인한 사람 — 다르면 탭해서 바꿔요.</div>
    <div class="row">
      <div class="top">
        <input class="amt" value="1,348,400">
        <button class="x">×</button>
      </div>
      <div class="bot">
        <input class="memo" value="가게 매출 입금">
        <button class="chip set">👤 이송은</button>
      </div>
    </div>
    <button class="addbtn">+ 통장 입금 추가</button>
  </div>

  <!-- 현금 지출 (분류 있음 + 안내) -->
  <div class="sec">
    <div class="sec-t"><span>💵 현금 지출</span><span class="tot">443,700원</span></div>
    <div class="sec-sub">금고에서 현금으로 나간 돈. 들어온 경우는 − 토글.<br>🏷️ <b>지출 분류</b>를 고르면 대시보드 지출 그래프에 자동 반영돼요.</div>
    <!-- 분류 고른 행 -->
    <div class="row">
      <div class="top">
        <button class="sign">−</button>
        <input class="amt" value="380,000">
        <button class="x">×</button>
      </div>
      <div class="bot">
        <input class="memo" value="식자재 구매(코스트코)">
        <button class="chip set">식자재비</button>
      </div>
    </div>
    <!-- 분류 안 고른 행 (안내 보임) -->
    <div class="row">
      <div class="top">
        <button class="sign">−</button>
        <input class="amt" placeholder="금액">
        <button class="x">×</button>
      </div>
      <div class="bot">
        <input class="memo" placeholder="메모 (선택)">
        <button class="chip">🏷️ 지출 분류</button>
      </div>
    </div>
    <button class="addbtn">+ 현금 지출 추가</button>
  </div>

  <div style="font-size:11px;color:var(--g500);text-align:center;margin-top:4px;line-height:1.6;">
    분류 버튼이 <b style="color:var(--g500)">🏷️ 지출 분류</b>(회색) → 고르면 <b style="color:var(--blue)">식자재비</b>(파랑)로 바뀜.<br>"이게 지출 카테고리에 들어가는 거구나" 바로 알 수 있어요.
  </div>
  <div style="height:30px"></div>
</div>
</body>
</html>
