<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래 채널 카드 3안 비교</title>
<style>
  :root{
    --white:#FFFFFF;
    --toss-blue:#3182F6;--toss-blue-strong:#0064FF;--toss-blue-light:#EDF4FF;
    --toss-text-1:#191F28;--toss-text-2:#333D4B;--toss-text-3:#6B7684;--toss-text-4:#8B95A1;--toss-text-5:#B0B8C1;
    --toss-line:#F2F4F6;--toss-line-2:#E5E8EB;
    --card-shadow:0 4px 14px rgba(20,40,80,0.07), 0 1px 3px rgba(20,40,80,0.05);
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;background:#EBEEF2;margin:0;padding:18px 14px 40px;color:var(--toss-text-1);}
  .phone{max-width:380px;margin:0 auto;}
  .opt-label{font-size:13px;font-weight:900;color:var(--toss-blue-strong);background:#fff;border:2px solid var(--toss-blue);border-radius:10px;padding:7px 12px;margin:26px 0 10px;display:inline-block;}
  .opt-desc{font-size:12px;color:var(--toss-text-3);margin:0 0 12px;line-height:1.5;font-weight:600;}
  .exp-section-ttl{font-size:12px;font-weight:800;color:var(--toss-text-3);margin:8px 4px 8px;letter-spacing:-0.2px;}

  /* 공통 카드 베이스 */
  .exp-channel-card{background:var(--white);border:0;border-radius:18px;padding:12px;cursor:pointer;box-shadow:var(--card-shadow);min-width:0;overflow:hidden;font-family:inherit;text-align:left;width:100%;}
  .ec-icon-wrap{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ec-icon-wrap.blue{background:var(--toss-blue-light);}
  .ec-icon-wrap.green{background:#E8F5E9;}
  .ec-icon-wrap.amber{background:#FFF6E0;}
  .ec-icon-wrap svg{width:18px;height:18px;}
  .ec-vl{font-size:18px;font-weight:800;color:var(--toss-text-1);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.5px;}
  .ec-sub{font-size:11px;color:var(--toss-text-4);font-weight:500;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px;}
  .ec-nm{font-size:13px;font-weight:700;color:var(--toss-text-2);letter-spacing:-0.3px;}

  /* ── 안 A: 아이콘 위로 세로 쌓기 (가로 3개 유지) ── */
  .gridA{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
  .gridA .exp-channel-card{display:flex;flex-direction:column;align-items:flex-start;}
  .gridA .ec-head{display:flex;flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:10px;width:100%;}
  .gridA .ec-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .gridA .ec-vl,.gridA .ec-sub{width:100%;}

  /* ── 안 B: 이름 짧게 + 가로 (현재 구조 유지) ── */
  .gridB{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
  .gridB .exp-channel-card{display:flex;flex-direction:column;align-items:flex-start;}
  .gridB .ec-head{display:flex;align-items:center;width:100%;margin-bottom:10px;min-width:0;gap:8px;}
  .gridB .ec-nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .gridB .ec-vl,.gridB .ec-sub{width:100%;}

  /* ── 안 C: 세로 한 줄씩 3줄 ── */
  .gridC{display:flex;flex-direction:column;gap:10px;}
  .gridC .exp-channel-card{display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .gridC .ec-nm{flex:0 0 auto;}
  .gridC .ec-mid{flex:1;min-width:0;}
  .gridC .ec-right{text-align:right;flex:0 0 auto;}
  .gridC .ec-right .ec-vl{font-size:18px;}
  .gridC .ec-right .ec-sub{margin-top:2px;}
</style>
</head>
<body>
<div class="phone">

  <!-- 안 A -->
  <div class="opt-label">안 A · 아이콘 위로 쌓기 (추천)</div>
  <p class="opt-desc">이름 그대로 두고 아이콘을 글자 위로 올림. 글자가 카드 폭을 다 써서 안 짤림. 가로 3개(1×1×1) 유지.</p>
  <div class="exp-section-ttl">🚚 거래 채널</div>
  <div class="gridA">
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap blue"><svg viewBox="0 0 24 24" fill="none" stroke="#3182F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
        <div class="ec-nm">거래처 관리</div>
      </div>
      <div class="ec-vl">6,438,715</div>
      <div class="ec-sub">10곳</div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap green"><svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
        <div class="ec-nm">온라인</div>
      </div>
      <div class="ec-vl">0</div>
      <div class="ec-sub">2곳 · 이번달</div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap amber"><svg viewBox="0 0 24 24" fill="none" stroke="#F5A11E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg></div>
        <div class="ec-nm">마트·시장</div>
      </div>
      <div class="ec-vl">561,610</div>
      <div class="ec-sub">37건 · 이번달</div>
    </button>
  </div>

  <!-- 안 B -->
  <div class="opt-label">안 B · 이름 짧게 + 가로 유지</div>
  <p class="opt-desc">아이콘 옆 가로 배치 그대로 두되 이름을 "거래처/온라인/마트"로 줄여서 안 짤리게.</p>
  <div class="exp-section-ttl">🚚 거래 채널</div>
  <div class="gridB">
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap blue"><svg viewBox="0 0 24 24" fill="none" stroke="#3182F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
        <div class="ec-nm">거래처</div>
      </div>
      <div class="ec-vl">6,438,715</div>
      <div class="ec-sub">10곳</div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap green"><svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
        <div class="ec-nm">온라인</div>
      </div>
      <div class="ec-vl">0</div>
      <div class="ec-sub">2곳 · 이번달</div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-head">
        <div class="ec-icon-wrap amber"><svg viewBox="0 0 24 24" fill="none" stroke="#F5A11E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg></div>
        <div class="ec-nm">마트</div>
      </div>
      <div class="ec-vl">561,610</div>
      <div class="ec-sub">37건 · 이번달</div>
    </button>
  </div>

  <!-- 안 C -->
  <div class="opt-label">안 C · 세로 한 줄씩 3줄</div>
  <p class="opt-desc">이름 그대로 두고 카드를 위→아래로 길게 3줄. 폭이 넓어 금액·건수 한눈에. 세로로 길어짐.</p>
  <div class="exp-section-ttl">🚚 거래 채널</div>
  <div class="gridC">
    <button class="exp-channel-card">
      <div class="ec-icon-wrap blue"><svg viewBox="0 0 24 24" fill="none" stroke="#3182F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
      <div class="ec-mid"><div class="ec-nm">거래처 관리</div><div class="ec-sub">10곳</div></div>
      <div class="ec-right"><div class="ec-vl">6,438,715</div></div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-icon-wrap green"><svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
      <div class="ec-mid"><div class="ec-nm">온라인</div><div class="ec-sub">2곳 · 이번달</div></div>
      <div class="ec-right"><div class="ec-vl">0</div></div>
    </button>
    <button class="exp-channel-card">
      <div class="ec-icon-wrap amber"><svg viewBox="0 0 24 24" fill="none" stroke="#F5A11E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg></div>
      <div class="ec-mid"><div class="ec-nm">마트·시장</div><div class="ec-sub">37건 · 이번달</div></div>
      <div class="ec-right"><div class="ec-vl">561,610</div></div>
    </button>
  </div>

</div>
</body>
</html>
