<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A안 적용 — 아이폰/갤럭시 한 화면 체크</title>
<link rel="stylesheet" href="../../assets/styles.css">
<style>
  body{margin:0;background:#5B6573;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:24px;}
  .stage{display:flex;gap:30px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .col-ttl{color:#fff;font-size:15px;font-weight:800;}
  .col-sub{color:#C6CDD6;font-size:11.5px;margin-top:-4px;text-align:center;}
  .phone{background:#F2F4F6;border-radius:30px;overflow:hidden;position:relative;box-shadow:0 14px 40px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);}
  .phone.ip{width:393px;height:852px;}
  .phone.gx{width:360px;height:780px;}
  .scr{height:100%;overflow:hidden;}
  .sbar{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-weight:700;font-size:14px;color:#191F28;}
  .hdr{display:flex;align-items:center;gap:6px;padding:8px 14px 10px;background:#fff;border-bottom:1px solid #F2F4F6;}
  .hdr .lg{display:flex;align-items:center;gap:5px;font-weight:800;color:#0050FF;font-size:16px;}
  .hdr .lgm{width:23px;height:23px;border-radius:7px;background:#0050FF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .hdr .chip{margin-left:auto;background:#F2F4F6;border-radius:13px;padding:5px 9px;font-size:11px;font-weight:700;color:#4E5968;}
  .hdr .chip.boss{background:#FEF3C7;color:#92660C;margin-left:6px;}
  .hdr .chip.usr{color:#4E5968;margin-left:6px;}
  .body{padding:14px 16px;}
</style>
</head>
<body>
<div class="stage">
  <div class="col">
    <div class="col-ttl">아이폰 (393×852)</div>
    <div class="col-sub">A안 적용</div>
    <div class="phone ip"><div class="scr">
      <div class="sbar"><span>4:19</span><span>📶 81%</span></div>
      <div class="hdr"><div class="lg"><span class="lgm">₩</span>캐쉬플로우</div><span class="chip">퐁당샤브 논산점</span><span class="chip boss">사장</span><span class="chip usr">이송은</span></div>
      <div class="body" id="ip"></div>
    </div></div>
  </div>
  <div class="col">
    <div class="col-ttl">갤럭시 (360×780)</div>
    <div class="col-sub">A안 적용 — 더 짧음</div>
    <div class="phone gx"><div class="scr">
      <div class="sbar"><span>4:19</span><span>📶 81%</span></div>
      <div class="hdr"><div class="lg"><span class="lgm">₩</span>캐쉬플로우</div><span class="chip">퐁당샤브 논산점</span><span class="chip boss">사장</span><span class="chip usr">이송은</span></div>
      <div class="body" id="gx"></div>
    </div></div>
  </div>
</div>

        </div>

      </div>
      <div class="t7-ve-section" style="display:block;">
        <div class="t7-ve-head">🧾 어디에 썼나<span class="t7-ve-note">고정비·인건비 제외</span></div>
        <div class="t7-ve-list">
          <div class="ve-item"><span class="vname">프레시원</span><span class="ve-cat-tag" style="background:#0CAB6C1A;color:#0CAB6C;">식자재</span><span class="vamt">304,886원</span></div>

    <div class="dash-sec"><span class="ic">📆</span>이번 달 요약</div>

      <div class="m6-top">
        <div class="m6-donut-wrap">
          <div class="m6-donut" style="background:conic-gradient(#0CAB6C 0% 62%, #3182F6 62% 84%, #F5A11E 84% 92%, #8B5CF6 92% 97%, #EF4444 97% 100%);"></div>

      <div class="m6-fc neg"><span class="fc-tx">이대로 가면 이번달 <span class="fc-sale">5,342만</span> 매출에 <span class="fc-gl">294만 손해</span>예요</span><span class="fc-more">자세히 ›</span></div>
    </div>
  `;
}
document.getElementById('ip').innerHTML = homeHtml();
document.getElementById('gx').innerHTML = homeHtml();
</script>
</body>
</html>
