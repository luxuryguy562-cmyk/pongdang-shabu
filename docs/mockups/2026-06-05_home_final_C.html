<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>홈 최종안 C — 실제 화면</title>
<link rel="stylesheet" href="../../assets/styles.css">
<style>
  body{margin:0;background:#3A4250;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:30px;}
  .stage{display:flex;gap:36px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .col-ttl{color:#fff;font-size:15px;font-weight:800;}
  .col-sub{color:#C6CDD6;font-size:12px;text-align:center;line-height:1.6;}
  .device{background:#0A0A0A;border-radius:46px;padding:11px;box-shadow:0 16px 44px rgba(0,0,0,.4);}
  .screen{background:#F2F4F6;border-radius:36px;overflow:hidden;position:relative;display:flex;flex-direction:column;width:393px;height:852px;}
  .safetop{background:#fff;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;position:relative;flex:none;height:59px;}
  .safetop .clk{font-size:14px;font-weight:700;color:#191F28;}
  .safetop .rgt{font-size:12px;color:#191F28;}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#0A0A0A;border-radius:18px;}
  .apphdr{flex:none;display:flex;align-items:center;gap:6px;padding:0 14px;background:#fff;border-bottom:1px solid #F2F4F6;height:50px;}
  .apphdr .lg{display:flex;align-items:center;gap:5px;font-weight:800;color:#0050FF;font-size:16px;}
  .apphdr .lgm{width:23px;height:23px;border-radius:7px;background:#0050FF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .apphdr .chip{margin-left:auto;background:#F2F4F6;border-radius:13px;padding:5px 9px;font-size:11px;font-weight:700;color:#4E5968;}
  .apphdr .chip.boss{background:#FEF3C7;color:#92660C;margin-left:6px;}
  .content{flex:1;overflow:hidden;position:relative;}
  .body{padding:14px 16px 20px;}
  .tabbar{flex:none;display:flex;align-items:center;justify-content:space-around;background:#fff;border-top:1px solid #F2F4F6;height:48px;}
  .tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#8B95A1;font-size:9.5px;}
  .tb.on{color:#0050FF;font-weight:700;}
  .tb .i{font-size:20px;}
  .safebottom{background:#fff;flex:none;height:34px;display:flex;align-items:center;justify-content:center;}
  .safebottom .bar{width:134px;height:5px;border-radius:3px;background:#191F28;}

  /* ── C안: 여백 풀기 + 점선 없앰 ── */
  .c .dash-hello{margin:6px 4px 12px!important;}
  .c .dash-hello h1{font-size:17px!important;}
  .c .dash-hello p{font-size:12px!important;}
  .c .wn-card{margin:0 0 12px!important;padding:10px 14px!important;min-height:46px!important;}
  .c .dash-today-v7{padding:16px 16px 14px!important;}
  .c .dash-today-v7 .t7-rows{margin-top:10px!important;}
  .c .dash-today-v7 .t7-row{height:38px!important;}
  /* 점선 → 실선 + 배경 없앰 */
  .c .dash-today-v7 .t7-ve-section{border-top:1px solid #F2F4F6!important;margin-top:6px!important;padding-top:10px!important;}
  .c .dash-today-v7 .t7-ve-list{border:none!important;background:#F5F6F8!important;border-radius:12px!important;padding:4px 12px!important;}
  /* 그라데이션 위치도 자연스럽게 */
  .c .dash-today-v7 .t7-ve-section::after{background:linear-gradient(to bottom,rgba(245,246,248,0) 0%,rgba(245,246,248,.3) 25%,rgba(245,246,248,.7) 60%,rgba(245,246,248,.95) 85%,#F5F6F8 100%)!important;}
  .c .dash-sec{margin:14px 2px 8px!important;font-size:13px!important;}
  .c .v17-card-v6{padding:15px!important;}
  .c .m6-top{margin-bottom:10px!important;}

  /* ── C안: 빈 상태 글꼴 (Stripe 스타일) ── */
  .c-sales-empty{font-size:28px!important;font-weight:800!important;color:#C8CDD4!important;letter-spacing:-1px!important;line-height:1.1!important;font-variant-numeric:tabular-nums!important;}
  .c-sales-hint{font-size:10.5px;font-weight:500;color:#C8CDD4;margin-top:1px;letter-spacing:-0.2px;}
  .c-profit-empty{font-size:13px!important;font-weight:600!important;color:#B0B8C1!important;letter-spacing:-0.3px!important;text-align:right!important;width:100%!important;}
</style>
</head>
<body>
