<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>어디에 썼나 — 86px 조정</title>
<link rel="stylesheet" href="../../assets/styles.css">
<style>
  body{margin:0;background:#3A4250;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:30px;}
  .stage{display:flex;flex-direction:column;gap:26px;align-items:flex-start;}
  .col{display:flex;flex-direction:row;align-items:center;gap:24px;}
  .col-head{width:330px;text-align:right;}
  .col-ttl{color:#fff;font-size:21px;font-weight:800;}
  .col-sub{color:#C6CDD6;font-size:14px;line-height:1.6;margin-top:6px;}
  .card{width:460px;}
  .card .t7-ve-section{border-top:none!important;padding-top:0!important;margin-top:0!important;}
  .ve-grad .t7-ve-section{position:relative;}
  .ve-grad .t7-ve-section::after{content:'';position:absolute;left:3px;right:3px;bottom:3px;height:16px;
    background:linear-gradient(to bottom, rgba(250,251,252,0) 0%, rgba(250,251,252,.7) 55%, rgba(250,251,252,.98) 100%);
    border-radius:0 0 13px 13px;pointer-events:none;}
  .h-82 .t7-ve-list{height:82px!important;}
  .h-86 .t7-ve-list{height:86px!important;}
  .h-90 .t7-ve-list{height:90px!important;}
</style>
</head>
<body>
<div class="stage">

  <div class="col">
    <div class="col-head"><div class="col-ttl">82px</div><div class="col-sub">(참고) B1</div></div>
    <div class="dash-today-v7 card ve-grad h-82">
      <div class="t7-ve-section" style="display:block;">
        <div class="t7-ve-head">🧾 어디에 썼나<span class="t7-ve-note">고정비·인건비 제외</span></div>
        <div class="t7-ve-list" id="l82"></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="col-head"><div class="col-ttl">86px ⭐</div><div class="col-sub">B1·B2 사이 (사장님 선택)</div></div>
    <div class="dash-today-v7 card ve-grad h-86">
      <div class="t7-ve-section" style="display:block;">
        <div class="t7-ve-head">🧾 어디에 썼나<span class="t7-ve-note">고정비·인건비 제외</span></div>
        <div class="t7-ve-list" id="l86"></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="col-head"><div class="col-ttl">90px</div><div class="col-sub">(참고) B2 · 너무 다 보임</div></div>
    <div class="dash-today-v7 card ve-grad h-90">
      <div class="t7-ve-section" style="display:block;">
        <div class="t7-ve-head">🧾 어디에 썼나<span class="t7-ve-note">고정비·인건비 제외</span></div>
        <div class="t7-ve-list" id="l90"></div>
      </div>
    </div>
  </div>

</div>

<script>
const items = [
  {n:'프레시원', c:'식자재', col:'#0CAB6C', a:'304,886원'},
  {n:'논산농협 하나로마트', c:'기타', col:'#3182F6', a:'30,550원'},
  {n:'웰스토리', c:'식자재', col:'#0CAB6C', a:'20,911원'},
  {n:'쿠팡', c:'비품', col:'#F5A11E', a:'12,400원'},
  {n:'CJ프레시웨이', c:'식자재', col:'#0CAB6C', a:'9,800원'},
];
function listHtml(){
  return items.map(it=>`<div class="ve-item"><span class="vname">${it.n}</span>`
    +`<span class="ve-cat-tag" style="background:${it.col}1A;color:${it.col};">${it.c}</span>`
    +`<span class="vamt">${it.a}</span></div>`).join('');
}
['l82','l86','l90'].forEach(id=>document.getElementById(id).innerHTML=listHtml());
</script>
</body>
</html>
