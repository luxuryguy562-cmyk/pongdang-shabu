<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>홈 — 현재 vs 여백 풀기</title>
<link rel="stylesheet" href="../../assets/styles.css">
<style>
  body{margin:0;background:#3A4250;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:30px;}
  .stage{display:flex;gap:36px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .col-ttl{color:#fff;font-size:15px;font-weight:800;}
  .col-sub{color:#C6CDD6;font-size:12px;text-align:center;line-height:1.6;}
  .phone{width:393px;background:#F2F4F6;border-radius:30px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);}
  .sbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;font-weight:700;font-size:14px;color:#191F28;background:#fff;position:relative;}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#0A0A0A;border-radius:18px;}
  .hdr{display:flex;align-items:center;gap:6px;padding:0 14px;background:#fff;border-bottom:1px solid #F2F4F6;height:50px;}
  .hdr .lg{display:flex;align-items:center;gap:5px;font-weight:800;color:#0050FF;font-size:16px;}
  .hdr .lgm{width:23px;height:23px;border-radius:7px;background:#0050FF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
  .hdr .chip{margin-left:auto;background:#F2F4F6;border-radius:13px;padding:5px 9px;font-size:11px;font-weight:700;color:#4E5968;}
  .hdr .chip.boss{background:#FEF3C7;color:#92660C;margin-left:6px;}
  .body{padding:14px 16px 20px;}
  /* 탭바 */
  .tabbar{display:flex;align-items:center;justify-content:space-around;background:#fff;border-top:1px solid #F2F4F6;height:48px;}
  .tb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#8B95A1;font-size:9.5px;}
  .tb.on{color:#0050FF;font-weight:700;}
  .tb .i{font-size:20px;}
  .safebottom{background:#fff;height:34px;display:flex;align-items:center;justify-content:center;}
  .safebottom .bar{width:134px;height:5px;border-radius:3px;background:#191F28;}

  /* ── 개선안 전용 재정의 ── */
  .new .dash-hello{margin:6px 4px 12px!important;}
  .new .dash-hello h1{font-size:17px!important;}
  .new .dash-hello p{font-size:12px!important;}
  .new .wn-card{margin:0 0 12px!important;padding:10px 14px!important;min-height:46px!important;}
  .new .dash-today-v7{padding:16px 16px 14px!important;margin-bottom:0!important;}
  .new .dash-today-v7 .t7-rows{margin-top:10px!important;}
  .new .dash-today-v7 .t7-row{height:38px!important;}
  /* 점선 → 없앰 */
  .new .dash-today-v7 .t7-ve-section{border-top:1px solid #F2F4F6!important;margin-top:4px!important;padding-top:10px!important;}
  .new .dash-today-v7 .t7-ve-list{border:none!important;background:#F5F6F8!important;border-radius:12px!important;padding:4px 12px!important;}
  .new .dash-sec{margin:14px 2px 8px!important;font-size:13px!important;}
  .new .v17-card-v6{padding:15px!important;}
  .new .m6-top{margin-bottom:10px!important;}
</style>
</head>
<body>
<div class="stage">

  <!-- 현재 -->
  <div class="col">
    <div class="col-ttl">현재</div>
    <div class="col-sub">한 화면 맞추느라 다 조인 상태<br>점선 박스 뜬금없음</div>
    <div class="phone">
      <div class="sbar"><div class="island"></div><span>5:50</span><span>📶 🔋</span></div>
      <div class="hdr"><div class="lg"><span class="lgm">₩</span>캐쉬플로우</div><span class="chip">퐁당샤브 논산점</span><span class="chip boss">사장</span></div>
      <div class="body" id="cur"></div>
      <div class="tabbar">
        <div class="tb on"><span class="i">🏠</span>홈</div>
        <div class="tb"><span class="i">🕐</span>근태관리</div>
        <div class="tb"><span class="i">🐷</span>개시·마감</div>
        <div class="tb"><span class="i">💳</span>지출관리</div>
        <div class="tb"><span class="i">⊞</span>더보기</div>
      </div>
      <div class="safebottom"><div class="bar"></div></div>
    </div>
  </div>

  <!-- 개선안 -->
  <div class="col">
    <div class="col-ttl">개선안 ⭐</div>
    <div class="col-sub">여백 숨통 트임 + 점선 없앰<br>(스크롤 자연스럽게)</div>
    <div class="phone">
      <div class="sbar"><div class="island"></div><span>5:50</span><span>📶 🔋</span></div>
      <div class="hdr"><div class="lg"><span class="lgm">₩</span>캐쉬플로우</div><span class="chip">퐁당샤브 논산점</span><span class="chip boss">사장</span></div>
      <div class="body new" id="new"></div>
      <div class="tabbar">
        <div class="tb on"><span class="i">🏠</span>홈</div>
        <div class="tb"><span class="i">🕐</span>근태관리</div>
        <div class="tb"><span class="i">🐷</span>개시·마감</div>
        <div class="tb"><span class="i">💳</span>지출관리</div>
        <div class="tb"><span class="i">⊞</span>더보기</div>
      </div>
      <div class="safebottom"><div class="bar"></div></div>
    </div>
  </div>

</div>
<script>
function html(){
  return `
    <div class="dash-hello"><h1>안녕하세요, 사장님</h1><p>6월 5일 (금) · 오후 5:50</p></div>
    <div class="wn-card"><span class="wn-live off"></span><span class="wn-tt wait">아직 출근한 직원이 없어요</span><span class="wn-arr go">›</span></div>
    <div class="dash-today-v7">
      <div class="t7-head-v2">
        <button type="button" class="t7-nav" disabled>‹</button>
        <div class="t7-center">
          <div class="t7-day-row"><span class="t7-day-main">6월 5일 (금)</span><span class="t7-day-badge today" style="display:inline-block;">오늘</span></div>
          <span class="t7-day-sub live"><span class="live-dot-wrap"><span class="live-dot-ring"></span><span class="live-dot-inner"></span></span><span class="t7-sub-tx">영업 중</span></span>
        </div>
        <button type="button" class="t7-cal-btn">📅</button>
        <button type="button" class="t7-nav t7-nav-next" disabled>›</button>
      </div>
      <div class="t7-amt-row">
        <div class="t7-sales-col"><span class="t7-sales-lb">매출</span><div class="t7-amt" style="font-size:15px;color:#8B95A1;font-weight:600;">아직 매출 기록이 없어요</div></div>
        <button type="button" class="t7-detail-link">자세히 ›</button>
      </div>
      <div class="t7-rows" style="display:block;">
        <div class="t7-row"><div class="r-lb"><span class="dot red"></span>지출</div><span class="r-amt red">-841,475원</span><span class="r-go">›</span></div>
        <div class="t7-row"><div class="r-lb"><span class="dot green"></span>수익</div><span class="r-amt" style="color:#8B95A1;font-weight:700;">마감 후 확인</span><span class="r-go"></span></div>
      </div>
      <div class="t7-ve-section" style="display:block;">
        <div class="t7-ve-head">🧾 어디에 썼나<span class="t7-ve-note">고정비·인건비 제외</span></div>
        <div class="t7-ve-list">
          <div class="ve-item"><span class="vname">프레시원</span><span class="ve-cat-tag" style="background:#0CAB6C1A;color:#0CAB6C;">식자재</span><span class="vamt">304,886원</span></div>
          <div class="ve-item"><span class="vname">논산농협 하나로마트</span><span class="ve-cat-tag" style="background:#3182F61A;color:#3182F6;">기타</span><span class="vamt">30,550원</span></div>
          <div class="ve-item"><span class="vname">웰스토리</span><span class="ve-cat-tag" style="background:#0CAB6C1A;color:#0CAB6C;">식자재</span><span class="vamt">20,911원</span></div>
        </div>
      </div>
    </div>
    <div class="dash-sec"><span class="ic">📆</span>이번 달 요약</div>
    <div class="v17-card-v6">
      <div class="v6-ttl-row"><div class="v6-ttl"><b>6월</b> 5일 진행</div><span class="v6-progress-tag">17%</span></div>
      <div class="m6-top">
        <div class="m6-donut-wrap">
          <div class="m6-donut" style="background:conic-gradient(#0CAB6C 0% 62%,#3182F6 62% 84%,#F5A11E 84% 92%,#8B5CF6 92% 97%,#EF4444 97% 100%);"></div>
          <div class="m6-donut-center"><span class="dc-pct" style="color:#EF4444;">-5%</span><span class="dc-lb">수익률</span></div>
        </div>
        <div class="m6-mrows">
          <div class="m6-mr"><span class="k">매출</span><span class="v">8,903,804원</span></div>
          <div class="m6-mr"><span class="k">지출</span><span class="v">9,393,037원</span></div>
          <div class="m6-mr"><span class="k">수익</span><span class="v red">-489,233원</span></div>
        </div>
      </div>
      <div class="m6-fc neg"><span class="fc-tx">이대로 가면 이번달 <span class="fc-sale">5,342만</span> 매출에 <span class="fc-gl">294만 손해</span>예요</span><span class="fc-more">자세히 ›</span></div>
    </div>`;
}
document.getElementById('cur').innerHTML = html();
document.getElementById('new').innerHTML = html();
</script>
</body>
</html>
