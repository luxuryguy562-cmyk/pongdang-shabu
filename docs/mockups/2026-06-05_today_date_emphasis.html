<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>오늘 카드 날짜 강조 — 현재 vs 개선안</title>
<link rel="stylesheet" href="../../assets/styles.css">
<style>
  body{margin:0;background:#3A4250;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:34px;}
  .stage{display:flex;gap:40px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;width:430px;}
  .col-ttl{color:#fff;font-size:17px;font-weight:800;}
  .col-sub{color:#C6CDD6;font-size:13px;text-align:center;line-height:1.5;}
  .card-wrap{width:100%;background:#F2F4F6;border-radius:20px;padding:16px;}
  /* 개선안 — 날짜 또렷하게 */
  .emph .dash-today-v7 .t7-day-main{font-size:20px!important;font-weight:900!important;letter-spacing:-0.7px!important;}
  .emph .dash-today-v7 .t7-day-badge.today{font-size:11px!important;padding:3px 9px!important;}
  .emph .dash-today-v7 .t7-center{gap:3px!important;}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<script>
function cardHtml(){
  return `
    <div class="dash-today-v7">
      <div class="t7-head-v2">
        <button type="button" class="t7-nav" disabled>‹</button>
        <div class="t7-center">
          <div class="t7-day-row"><span class="t7-day-main">6월 5일 (금)</span><span class="t7-day-badge today" style="display:inline-block;">오늘</span></div>
          <span class="t7-day-sub live"><span class="live-dot-wrap"><span class="live-dot-ring"></span><span class="live-dot-inner"></span></span><span class="t7-sub-tx">영업 중</span></span>
        </div>
        <button type="button" class="t7-cal-btn">📅</button>
        <button type="button" class="t7-nav t7-nav-next" disabled>›</button>
      </div>
      <div class="t7-amt-row">
        <div class="t7-sales-col"><span class="t7-sales-lb">매출</span><div class="t7-amt" style="font-size:15px;color:#8B95A1;font-weight:600;">아직 매출 기록이 없어요</div></div>
        <button type="button" class="t7-detail-link">자세히 ›</button>
      </div>
      <div class="t7-rows" style="display:block;">
        <div class="t7-row"><div class="r-lb"><span class="dot red"></span>지출</div><span class="r-amt red">-841,475원</span><span class="r-go">›</span></div>
        <div class="t7-row"><div class="r-lb"><span class="dot green"></span>수익</div><span class="r-amt" style="color:#8B95A1;font-weight:700;">마감 후 확인</span><span class="r-go"></span></div>
      </div>
    </div>`;
}
const cols=[
  {ttl:'현재', sub:'날짜 16px · 양옆 버튼에 묻힘', cls:''},
  {ttl:'개선안 ⭐', sub:'날짜 20px·더 굵게 + 오늘 배지 초록', cls:'emph'},
];
const stage=document.getElementById('stage');
cols.forEach(c=>{
  const col=document.createElement('div'); col.className='col';
  col.innerHTML=`<div class="col-ttl">${c.ttl}</div><div class="col-sub">${c.sub}</div>
    <div class="card-wrap ${c.cls}">${cardHtml()}</div>`;
  stage.appendChild(col);
});
</script>
</body>
</html>
