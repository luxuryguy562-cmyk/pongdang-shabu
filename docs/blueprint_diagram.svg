<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0050FF"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#DC2626"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="800" fill="#111">
    🏪 퐁당샤브 청사진 — v2 (사장님 정정 반영)
  </text>
  <text x="550" y="68" text-anchor="middle" font-size="13" fill="#666">
    거래처·영수증·은행카드는 분류 폴더 "입구"로 들어가서 어느 카테고리든 갈 수 있음
  </text>

  <!-- ============== 입력 측 (위) ============== -->

  <!-- 1. 직원 / 출퇴근 -->
  <g>
    <rect x="40" y="110" width="200" height="100" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="140" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#92400E">👥 직원</text>
    <text x="140" y="165" text-anchor="middle" font-size="13" fill="#78350F">출퇴근 노트</text>
    <text x="140" y="185" text-anchor="middle" font-size="11" fill="#92400E">시급·월급 자동 계산</text>
  </g>

  <!-- 2. 거래처 / 주문장부 -->
  <g>
    <rect x="290" y="110" width="220" height="100" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="400" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#1E3A8A">🏬 거래처</text>
    <text x="400" y="165" text-anchor="middle" font-size="13" fill="#1E40AF">주문 장부 (단가·수량)</text>
    <text x="400" y="185" text-anchor="middle" font-size="11" fill="#1E3A8A">사장님이 분류 지정 → 그쪽으로</text>
  </g>

  <!-- 3. 영수증 -->
  <g>
    <rect x="560" y="110" width="220" height="100" rx="14" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
    <text x="670" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#831843">🧾 영수증</text>
    <text x="670" y="165" text-anchor="middle" font-size="13" fill="#9D174D">AI 사진 자동 인식</text>
    <text x="670" y="185" text-anchor="middle" font-size="11" fill="#831843">AI가 분류 추천 → 사장님 정정</text>
  </g>

  <!-- 4. 은행/카드 -->
  <g>
    <rect x="830" y="110" width="220" height="100" rx="14" fill="#E0E7FF" stroke="#6366F1" stroke-width="2"/>
    <text x="940" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#312E81">🏦 은행·카드</text>
    <text x="940" y="165" text-anchor="middle" font-size="13" fill="#3730A3">엑셀 / 미래 SMS</text>
    <text x="940" y="185" text-anchor="middle" font-size="11" fill="#312E81">키워드 학습으로 자동 분류</text>
  </g>

  <!-- ============== 중간: 마감 / 매출 ============== -->

  <!-- 5. 마감정산 -->
  <g>
    <rect x="290" y="270" width="220" height="100" rx="14" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="400" y="300" text-anchor="middle" font-size="18" font-weight="700" fill="#7F1D1D">💰 마감 정산</text>
    <text x="400" y="325" text-anchor="middle" font-size="13" fill="#991B1B">매일 현금·POS 입력</text>
    <text x="400" y="345" text-anchor="middle" font-size="11" fill="#7F1D1D">차감(인출·송금) 분류 가능</text>
  </g>

  <!-- 6. 매출 장부 -->
  <g>
    <rect x="40" y="270" width="200" height="100" rx="14" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="140" y="300" text-anchor="middle" font-size="18" font-weight="700" fill="#064E3B">💵 매출 장부</text>
    <text x="140" y="325" text-anchor="middle" font-size="13" fill="#065F46">하루 1줄 (자동)</text>
    <text x="140" y="345" text-anchor="middle" font-size="11" fill="#064E3B">매출의 단일 진실</text>
  </g>

  <!-- 마감 → 매출 자동 동기화 (파란) -->
  <line x1="290" y1="320" x2="245" y2="320" stroke="#0050FF" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="265" y="312" text-anchor="middle" font-size="10" font-weight="700" fill="#0050FF">자동sync</text>

  <!-- 7. 고정비 시트 (사이드메뉴) -->
  <g>
    <rect x="830" y="270" width="220" height="100" rx="14" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
    <text x="940" y="300" text-anchor="middle" font-size="18" font-weight="700" fill="#713F12">📋 고정비 시트</text>
    <text x="940" y="325" text-anchor="middle" font-size="13" fill="#854D0E">월세·인터넷·보험·세금</text>
    <text x="940" y="345" text-anchor="middle" font-size="11" fill="#713F12">사장님이 한 번 입력</text>
  </g>

  <!-- ============== 지출 분류 폴더 (가운데 큰 입구) ============== -->

  <!-- 폴더 입구 표시 (큰 박스) -->
  <g>
    <rect x="280" y="450" width="540" height="220" rx="22" fill="#FFFBEB" stroke="#D97706" stroke-width="4"/>
    <text x="550" y="485" text-anchor="middle" font-size="20" font-weight="800" fill="#78350F">📁 지출 분류 폴더 (입구)</text>
    <text x="550" y="508" text-anchor="middle" font-size="12" fill="#92400E">위에서 들어온 모든 거래는 이 폴더 중 한 칸에 분류됨</text>

    <!-- 카테고리 항목들 — 각자 어디서 데이터 받는지 작은 글자로 -->
    <g font-size="10" fill="#451A03">
      <!-- 식자재 -->
      <rect x="305" y="525" width="160" height="55" rx="8" fill="#FED7AA" stroke="#EA580C"/>
      <text x="385" y="545" text-anchor="middle" font-size="13" font-weight="700">🥬 식자재</text>
      <text x="385" y="563" text-anchor="middle" font-size="9">거래처+영수증 합산</text>
      <text x="385" y="575" text-anchor="middle" font-size="9">(육류/야채/공산품)</text>

      <!-- 인건비 (출퇴근 전용) -->
      <rect x="475" y="525" width="160" height="55" rx="8" fill="#FDE68A" stroke="#CA8A04"/>
      <text x="555" y="545" text-anchor="middle" font-size="13" font-weight="700">👷 인건비</text>
      <text x="555" y="563" text-anchor="middle" font-size="9">⚠️ 출퇴근 전용</text>
      <text x="555" y="575" text-anchor="middle" font-size="9">(시급제+월급제)</text>

      <!-- 고정비/공과금 (고정비 시트 전용) -->
      <rect x="645" y="525" width="160" height="55" rx="8" fill="#FEF08A" stroke="#A16207"/>
      <text x="725" y="545" text-anchor="middle" font-size="13" font-weight="700">📋 고정비/공과금</text>
      <text x="725" y="563" text-anchor="middle" font-size="9">⚠️ 고정비 시트 전용</text>
      <text x="725" y="575" text-anchor="middle" font-size="9">(월세·전기·가스)</text>

      <!-- 주류 -->
      <rect x="305" y="590" width="160" height="55" rx="8" fill="#FECDD3" stroke="#E11D48"/>
      <text x="385" y="610" text-anchor="middle" font-size="13" font-weight="700">🍶 주류</text>
      <text x="385" y="628" text-anchor="middle" font-size="9">거래처+영수증</text>
      <text x="385" y="640" text-anchor="middle" font-size="9">(소주·맥주·기타)</text>

      <!-- 비품/소모품 -->
      <rect x="475" y="590" width="160" height="55" rx="8" fill="#FED7AA" stroke="#EA580C"/>
      <text x="555" y="610" text-anchor="middle" font-size="13" font-weight="700">🛍️ 비품·소모품</text>
      <text x="555" y="628" text-anchor="middle" font-size="9">영수증 위주</text>
      <text x="555" y="640" text-anchor="middle" font-size="9">(주방·청소·포장지)</text>

      <!-- 마케팅·세금·기타 -->
      <rect x="645" y="590" width="160" height="55" rx="8" fill="#E9D5FF" stroke="#9333EA"/>
      <text x="725" y="610" text-anchor="middle" font-size="13" font-weight="700">💸 마케팅·세금·기타</text>
      <text x="725" y="628" text-anchor="middle" font-size="9">은행·카드 / 수동</text>
      <text x="725" y="640" text-anchor="middle" font-size="9">(광고비·부가세)</text>
    </g>
  </g>

  <!-- ============== 화살표: 입력 → 분류 폴더 입구 (전체) ============== -->

  <!-- 출퇴근 → 인건비 (특별 직선) -->
  <path d="M140,210 L550,525" stroke="#F59E0B" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="200" y="380" font-size="11" font-weight="700" fill="#92400E">출퇴근 → 인건비만 (자동)</text>

  <!-- 거래처 → 폴더 입구 (위 가운데) -->
  <path d="M400,210 L500,450" stroke="#DC2626" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="290" y="395" font-size="11" font-weight="700" fill="#DC2626">⚠️ 거래처가 어느 분류든</text>
  <text x="290" y="408" font-size="11" font-weight="700" fill="#DC2626">FK 깨지면 매입 누락</text>

  <!-- 영수증 → 폴더 입구 -->
  <path d="M670,210 L600,450" stroke="#DC2626" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="640" y="395" font-size="11" font-weight="700" fill="#DC2626">⚠️ 영수증이 어느 분류든</text>
  <text x="640" y="408" font-size="11" font-weight="700" fill="#DC2626">소분류 id 규칙</text>

  <!-- 은행카드 → 폴더 입구 -->
  <path d="M940,210 L700,450" stroke="#DC2626" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="870" y="395" font-size="11" font-weight="700" fill="#DC2626">⚠️ 은행카드가 어느 분류든</text>
  <text x="870" y="408" font-size="11" font-weight="700" fill="#DC2626">대분류 id 규칙</text>

  <!-- 마감 차감 → 폴더 -->
  <path d="M400,370 L450,450" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="380" y="425" font-size="10" fill="#444">차감</text>

  <!-- 고정비 시트 → 고정비/공과금 (직선) -->
  <path d="M940,370 L750,525" stroke="#CA8A04" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="820" y="450" font-size="11" font-weight="700" fill="#854D0E">고정비 → 고정비/공과금만</text>

  <!-- ============== 출력 측 (아래) ============== -->

  <!-- 대시보드 -->
  <g>
    <rect x="350" y="780" width="400" height="120" rx="18" fill="#1E293B" stroke="#0F172A" stroke-width="3"/>
    <text x="550" y="815" text-anchor="middle" font-size="22" font-weight="800" fill="#FFFFFF">📊 대시보드 (홈)</text>
    <text x="550" y="842" text-anchor="middle" font-size="14" fill="#E2E8F0">매출 − 지출 = 순익</text>
    <text x="550" y="865" text-anchor="middle" font-size="12" fill="#94A3B8">월/주/일별 + 자동 인사이트</text>
    <text x="550" y="885" text-anchor="middle" font-size="12" fill="#FBBF24">→ 사장님이 "얼마 남았나" 한눈에</text>
  </g>

  <!-- 매출 → 대시보드 -->
  <path d="M140,370 Q140,780 350,830" stroke="#10B981" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="160" y="680" font-size="11" font-weight="700" fill="#065F46">매출 (+)</text>

  <!-- 분류 폴더 → 대시보드 -->
  <line x1="550" y1="670" x2="550" y2="780" stroke="#D97706" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="570" y="725" font-size="11" font-weight="700" fill="#78350F">지출 합산 (−)</text>

  <!-- 예비비 -->
  <g>
    <rect x="850" y="700" width="200" height="80" rx="14" fill="#F3E8FF" stroke="#A855F7" stroke-width="2"/>
    <text x="950" y="728" text-anchor="middle" font-size="16" font-weight="700" fill="#581C87">🏦 예비비 금고</text>
    <text x="950" y="752" text-anchor="middle" font-size="11" fill="#6B21A8">자동 적립 + 사용</text>
    <text x="950" y="770" text-anchor="middle" font-size="10" fill="#581C87">사장님 비상금</text>
  </g>

  <!-- 은행카드 → 예비비 자동 -->
  <path d="M940,210 Q1060,400 1000,700" stroke="#0050FF" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- 예비비 → 대시보드 -->
  <path d="M850,765 Q800,800 750,840" stroke="#A855F7" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 범례 -->
  <g transform="translate(40,920)">
    <rect x="0" y="0" width="1020" height="50" rx="8" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#374151">범례:</text>
    <line x1="80" y1="18" x2="120" y2="18" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="128" y="22" font-size="11" fill="#374151">특정 카테고리만 (출퇴근→인건비 / 고정비 시트→고정비)</text>
    <line x1="500" y1="18" x2="540" y2="18" stroke="#DC2626" stroke-width="2.5"/>
    <text x="548" y="22" font-size="11" fill="#374151">⚠️ 어느 카테고리든 (FK 깨지면 사장님 호소)</text>
    <line x1="850" y1="18" x2="890" y2="18" stroke="#0050FF" stroke-width="3"/>
    <text x="898" y="22" font-size="11" fill="#374151">자동 (사장님 손 X)</text>
    <text x="20" y="42" font-size="11" fill="#6B7280">→ 거래처·영수증·은행카드 = 데이터마다 분류 다름. 출퇴근·고정비 = 카테고리 고정.</text>
  </g>

</svg>
